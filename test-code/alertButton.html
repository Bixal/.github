<!DOCTYPE html>
<html>
<head>
    <title>Alert Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Alert System</h1>
        
        <div class="alert-form">
            <input type="text" id="user-message" placeholder="Enter your alert message">
            <div id="alert-btn" style="background-color: red; color: white; padding: 10px; cursor: pointer;">
                Send Alert
            </div>
        </div>
        
        <div id="alert-history">
            <!-- Previous alerts will appear here -->
        </div>
    </div>
    
    <script src="alertButton.js"></script>
    <script src="utils.js"></script>
</body>
</html>
